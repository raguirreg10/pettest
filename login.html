<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Paw & Petal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <!-- Absolute logo positioned to allow navigating back -->
    <a href="index.html" class="logo" style="position: absolute; top: 30px; left: 50px;">Paw & Petal</a>

    <div class="auth-card">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="hello@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary btn-full">Sign In</button>
        </form>
        <p style="margin-top: 25px; color: #666; font-size: 0.95rem;">
            Don't have an account? <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 800;">Create one</a>
        </p>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Successfully logged in! Redirecting...</div>

    <script src="script.js"></script>
</body>
</html>
